;************ Definitions **************
; [device name]        - Device Name as returned by NIDAQmx function DAQmxGetDevProductType
; timeoutForNIDAQmxOps - Time (in seconds) for a device to wait for an operation.
;                           Use only if device requires a value other than default of .1 seconds (e.g. Thermocouple devices)
; hasAnalogInput       - Device supports the analog input subsystem
; numAIChannels        - Number of Single Ended Channels supported by the device
; minAISampleRate      - Minimum Analog Input Sample rate. Use only if rate differs from default of 0.6 samples/second
; Force50VRangeTo42    - Some devices incorrectly report their avaliable ranges as -50 to +50V instead of -42 to +42V
; Force100VRangeTo42    -Some devices incorrectly report their avaliable ranges as -100 to +100V instead of -42.4 to +42.4V
; noCommitOnAIStart    - Some devices error when the task is committed and they are used with TriggerRepeat >= 1
; inputRangeTestVoltage- Maximum voltage to use when testing the range of input channels. Use only if differs from default of 1.0V.
; requiresRateSetBeforeOps - Some devices require a rate to be set before any other operation takes place.
; ADCTimingMode    - 0=HighResolution, 1=HighSpeed (tradeoff speed vs. accuracy; HighResolution lowers maximum sample rate)
; AIAutoZeroMode   - 0=None, 1= Once, 2= EverySample (Recalibration to a reference point/temperature for 
;                    higher accuracy; if done for every sample, uses up an entire channel reducing aggregate maximum sampling rate)
;
; hasAnalogOutput  - Device supports the analog output subsystem (default false)
; numAOChannels    - Number of Output Channels supported by the device
; minAOSampleRate  - Minimum Analog Output Sample rate. Use only if rate differs from default of 0.6 samples/second
; maxAOSampleRate  - Maximum Analog Output Sample Rate. One rate for each channel configuration
;                    0 designates static analog output sample rate
; minAONumSamples  - Minimum number of samples that the hardware requires must be queued with putdata() 
;                    before calling start().
; minAOAdaptorBufferSize - Minimum size of the buffer between the adaptor and NI-DAQmx drivers.
;                    Some devices need this to be the size of the hardware's FIFO. Default of 0 means use a buffer size that
;                    is calculated based on a multiple of the engine buffer size.
; outputRangeTestVoltage- Maximum voltage to use when testing the range of output channels. Use only if differs from default of 1.0V.
;
; hasDigitalIO     - Device supports the digital input/output subsystem (default false)
; digitalPortSize  - The number of lines on each port.  Ports are seperated by commas
; digitalPortCap   - Capabilities of each port:  
;                        1 = in only
;                        2 = out only
;                        3 = port bidirectional
;                        4 = line configurable (not supported, will be treated as port bidrectional)
;

